<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>规则管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #101d38;
      --border: rgba(129, 155, 255, 0.18);
      --text: #f3f7ff;
      --text-soft: #a9b7d4;
      --text-dim: #8090b3;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #eef4ff;
      --bg-soft: #f7faff;
      --panel: #ffffff;
      --panel-strong: #f5f8ff;
      --panel-hover: #edf3ff;
      --border: rgba(84, 112, 219, 0.16);
      --border-strong: rgba(84, 112, 219, 0.24);
      --text: #12213f;
      --text-soft: #4e5e82;
      --text-dim: #7d8ba8;
      --primary: #3f6fff;
      --primary-hover: #2d5dff;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 20px 42px rgba(57, 78, 137, 0.16);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 30%),
        linear-gradient(180deg, #0a1326 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 22px;
    }
    .page {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .page-header,
    .editor-container {
      background: linear-gradient(180deg, rgba(16, 29, 56, 0.98), rgba(13, 24, 46, 0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .page-header {
      padding: 22px 24px;
    }
    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .page-subtitle {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.7;
    }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(129, 155, 255, 0.12);
      border-radius: 999px;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.95), rgba(74, 115, 255, 0.92));
      color: white;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.22);
    }
    .editor-container {
      padding: 22px;
    }
    .editor-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .editor-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: var(--text-soft);
    }
    .stat-item {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(129, 155, 255, 0.12);
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 16px;
      border: 1px solid transparent;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--primary), #4f7fff);
      color: white;
    }
    .btn-primary:hover { background: linear-gradient(90deg, var(--primary-hover), #3e6dff); }
    .btn-secondary {
      background: rgba(29, 46, 82, 0.88);
      color: #dce7ff;
      border-color: rgba(129, 155, 255, 0.14);
    }
    .btn-secondary:hover { background: rgba(37, 58, 101, 0.95); }
    #editor {
      height: 560px;
      border: 1px solid rgba(129, 155, 255, 0.18);
      border-radius: 14px;
      overflow: hidden;
      background: #0b1220;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    #editor.ace_editor,
    #editor.ace-github {
      background: #0b1220 !important;
      color: #e6eefc !important;
    }
    #editor .ace_scroller,
    #editor .ace_content {
      background: #0b1220 !important;
    }
    #editor .ace_text-layer,
    #editor .ace_line {
      color: #e6eefc !important;
    }
    #editor .ace_gutter {
      background: #111a2d !important;
      color: #7d92bb !important;
      border-right: 1px solid rgba(129, 155, 255, 0.12);
    }
    #editor .ace_cursor {
      color: #dbe8ff !important;
    }
    #editor .ace_print-margin {
      background: rgba(129, 155, 255, 0.1) !important;
      width: 1px;
    }
    #editor .ace_marker-layer,
    #editor .ace_selection-layer {
      z-index: 5 !important;
    }
    #editor .ace_text-layer {
      z-index: 6 !important;
      background: transparent !important;
    }
    #editor .ace_marker-layer .ace_active-line,
    #editor .ace_gutter-active-line {
      background: rgba(59, 130, 246, 0.1) !important;
    }
    #editor .ace_marker-layer .ace_selection {
      background: rgba(96, 165, 250, 0.32) !important;
      border-radius: 2px;
      z-index: 6;
    }
    #editor.ace_multiselect .ace_selection.ace_start {
      box-shadow: 0 0 0 1px rgba(125, 211, 252, 0.45) !important;
      border-radius: 2px;
    }
    #editor .ace_marker-layer .ace_selected-word {
      background: rgba(96, 165, 250, 0.18) !important;
      border: 1px solid rgba(96, 165, 250, 0.3) !important;
    }
    #editor .ace_marker-layer .ace_bracket {
      border: 1px solid rgba(129, 155, 255, 0.35) !important;
      background: transparent !important;
    }
    #editor .ace_invisible {
      color: rgba(125, 146, 187, 0.4) !important;
    }
    #editor .ace_indent-guide,
    #editor .ace_indent-guide-active {
      background: none !important;
    }
    #editor .ace_comment {
      color: #6f86b3 !important;
      font-style: italic;
    }
    #editor .ace_keyword,
    #editor .ace_meta,
    #editor .ace_storage {
      color: #7cb7ff !important;
      font-weight: 600;
    }
    #editor .ace_string {
      color: #f7c97b !important;
    }
    #editor .ace_constant,
    #editor .ace_constant.ace_numeric,
    #editor .ace_constant.ace_language,
    #editor .ace_support.ace_function,
    #editor .ace_variable.ace_language,
    #editor .ace_variable.ace_class {
      color: #8be9fd !important;
    }
    .hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 12px;
      line-height: 1.7;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }
    .status.success {
      background: rgba(34, 197, 94, 0.14);
      color: #8ef0b0;
      border: 1px solid rgba(34, 197, 94, 0.24);
      display: block;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.14);
      color: #ffb0b0;
      border: 1px solid rgba(239, 68, 68, 0.26);
      display: block;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .editor-header { flex-direction: column; }
      .btn-group { width: 100%; display: grid; grid-template-columns: 1fr 1fr 1fr; }
    }
  
    :root[data-theme="light"] body { background: radial-gradient(circle at top, rgba(77, 124, 255, 0.12), transparent 28%), linear-gradient(180deg, #f7faff 0%, #eef4ff 100%); }
    :root[data-theme="light"] .page-header,
    :root[data-theme="light"] .editor-container { background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,249,255,0.98)); }

  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div class="page-title">规则管理</div>
      <div class="page-subtitle">直接编辑路由器本地规则文件，支持切换代理/直连、格式化、刷新与保存。</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="proxy">代理规则</button>
      <button class="tab" data-tab="direct">直连规则</button>
    </div>

    <div class="editor-container">
      <div class="editor-header">
        <div>
          <div class="editor-title" id="editorTitle">代理规则</div>
          <div class="stats" id="stats"></div>
        </div>
        <div class="btn-group">
          <button class="btn-secondary" id="format">格式化</button>
          <button class="btn-secondary" id="reload">刷新</button>
          <button class="btn-primary" id="save">保存</button>
        </div>
      </div>

      <div id="editor"></div>

      <div class="hint">提示：输入 <code>-</code> 或 <code>DOMAIN</code> 触发自动补全，按 <code>Ctrl/Cmd + S</code> 可快速保存。</div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="ace.js"></script>
  <script src="ext-language_tools.js"></script>
  <script src="api.js"></script>
  <script src="rules.js"></script>
</body>
</html>
