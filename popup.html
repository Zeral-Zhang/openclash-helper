<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      color-scheme: dark;
      --bg: #07101f;
      --bg-soft: #0d1730;
      --panel: #101a35;
      --panel-strong: #132046;
      --panel-muted: rgba(255,255,255,0.03);
      --border: rgba(116, 144, 255, 0.16);
      --border-strong: rgba(116, 144, 255, 0.26);
      --text: #eef4ff;
      --text-soft: #aab9d8;
      --text-dim: #7383a6;
      --primary: #4d7cff;
      --primary-strong: #386cff;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      --status-success-bg: rgba(34, 197, 94, 0.12);
      --status-success-text: #8ef0b0;
      --status-error-bg: rgba(239, 68, 68, 0.13);
      --status-error-text: #ffb0b0;
      --status-info-bg: rgba(96, 165, 250, 0.13);
      --status-info-text: #b7d4ff;
      --hint-bg: rgba(22, 163, 74, 0.12);
      --hint-border: rgba(34, 197, 94, 0.22);
      --hint-text: #86efac;
      --proxy-bg: rgba(239, 68, 68, 0.12);
      --proxy-border: rgba(239, 68, 68, 0.22);
      --proxy-text: #ffb4b4;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #eef4ff;
      --bg-soft: #f7faff;
      --panel: #ffffff;
      --panel-strong: #f5f8ff;
      --panel-muted: rgba(44, 81, 175, 0.04);
      --border: rgba(84, 112, 219, 0.16);
      --border-strong: rgba(84, 112, 219, 0.22);
      --text: #12213f;
      --text-soft: #4e5e82;
      --text-dim: #7d8ba8;
      --primary: #3f6fff;
      --primary-strong: #2d5dff;
      --shadow: 0 20px 42px rgba(57, 78, 137, 0.16);
      --status-success-bg: rgba(34, 197, 94, 0.12);
      --status-success-text: #0f7a35;
      --status-error-bg: rgba(239, 68, 68, 0.1);
      --status-error-text: #b42318;
      --status-info-bg: rgba(59, 130, 246, 0.1);
      --status-info-text: #2557b7;
      --hint-bg: rgba(34, 197, 94, 0.1);
      --hint-border: rgba(34, 197, 94, 0.2);
      --hint-text: #0f7a35;
      --proxy-bg: rgba(239, 68, 68, 0.08);
      --proxy-border: rgba(239, 68, 68, 0.18);
      --proxy-text: #b42318;
    }
    html, body {
      width: 430px;
      min-height: 548px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at top, rgba(77, 124, 255, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      color: var(--text);
    }
    body {
      padding: 14px;
      transition: background 0.2s ease, color 0.2s ease;
    }
    button, input { font: inherit; }
    .icon-btn svg,
    .brand-mark svg { width: 18px; height: 18px; display: block; }
    .brand-mark svg { width: 20px; height: 20px; }
    .popup-shell {
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(7, 16, 31, 0.5);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }
    :root[data-theme="light"] .popup-shell {
      background: rgba(255,255,255,0.76);
    }
    .hero {
      padding: 14px;
      background: linear-gradient(180deg, rgba(13, 24, 48, 0.96), rgba(10, 18, 36, 0.96));
      border-bottom: 1px solid var(--border);
    }
    :root[data-theme="light"] .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,248,255,0.98));
    }
    .hero-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .brand {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      color: #9ee06f;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      font-size: 17px;
    }
    :root[data-theme="light"] .brand-mark {
      background: linear-gradient(180deg, rgba(77,124,255,0.12), rgba(77,124,255,0.05));
      border-color: rgba(84, 112, 219, 0.18);
      color: #3f6fff;
    }
    .brand-copy {
      min-width: 0;
      overflow: hidden;
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: nowrap;
      min-width: 0;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .version-badge {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 600;
    }
    :root[data-theme="light"] .version-badge {
      background: rgba(77,124,255,0.08);
      border-color: rgba(84, 112, 219, 0.14);
    }
    .subtitle {
      color: var(--text-soft);
      font-size: 11px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .icon-actions {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      justify-content: flex-end;
      align-items: center;
    }
    .icon-btn {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border-strong);
      background: rgba(17, 31, 64, 0.72);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.16s ease;
      position: relative;
    }
    :root[data-theme="light"] .icon-btn {
      background: rgba(255,255,255,0.85);
    }
    .icon-btn:hover {
      transform: translateY(-1px);
      background: rgba(32, 49, 92, 0.9);
    }
    :root[data-theme="light"] .icon-btn:hover {
      background: rgba(245,248,255,1);
    }
    .icon-btn[data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(10, 15, 28, 0.96);
      color: #eef2ff;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255,255,255,0.08);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 30;
    }
    .icon-btn[data-tooltip]::before {
      content: '';
      position: absolute;
      top: calc(100% + 3px);
      right: 11px;
      width: 12px;
      height: 7px;
      background: rgba(10, 15, 28, 0.96);
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
      z-index: 29;
    }
    .icon-btn:hover::after,
    .icon-btn:hover::before,
    .icon-btn:focus-visible::after,
    .icon-btn:focus-visible::before {
      opacity: 1;
      transform: translateY(0);
    }
    .hero-card {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(13, 24, 48, 0.78), rgba(10, 18, 36, 0.58));
    }
    :root[data-theme="light"] .hero-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,249,255,0.96));
    }
    .site-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(77, 124, 255, 0.14);
      color: #cfe0ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    :root[data-theme="light"] .site-label { color: #3158b9; }
    .site-domain {
      font-size: 17px;
      line-height: 1.35;
      font-weight: 750;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-meta {
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.7;
      min-height: 18px;
    }
    .status-card {
      margin-top: 12px;
    }
    .status-note,
    .proxy-hint {
      border-radius: 14px;
      border: 1px solid transparent;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
    }
    .status-note.info {
      background: var(--status-info-bg);
      border-color: rgba(96, 165, 250, 0.18);
      color: var(--status-info-text);
    }
    .status-note.success {
      background: var(--hint-bg);
      border-color: var(--hint-border);
      color: var(--hint-text);
    }
    .status-note.warning {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.2);
      color: #f3c979;
    }
    .proxy-hint {
      background: var(--proxy-bg);
      border-color: var(--proxy-border);
      color: var(--proxy-text);
    }
    .quick-proxy-btn {
      width: 100%;
      margin-top: 8px;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid rgba(34, 197, 94, 0.18);
      background: linear-gradient(90deg, #17b15f, #10b981);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .content {
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    .section {
      padding: 12px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(16, 26, 53, 0.98), rgba(14, 23, 44, 0.98));
      border: 1px solid var(--border);
    }
    :root[data-theme="light"] .section {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(246,249,255,0.98));
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .radio-label {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 90px;
      padding: 8px 11px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-muted);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.16s ease;
    }
    .radio-label input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .radio-label:has(input:checked) {
      background: linear-gradient(90deg, var(--primary), var(--primary-strong));
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 22px rgba(77, 124, 255, 0.24);
    }
    .preview-chip {
      margin-top: 10px;
      min-height: 18px;
      color: var(--text-soft);
      font-size: 12px;
      line-height: 1.7;
    }
    .actions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .action-btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.16s ease;
    }
    .action-btn.direct {
      background: linear-gradient(90deg, #f59e0b, #f97316);
      color: white;
    }
    .action-btn.proxy {
      background: linear-gradient(90deg, #10b981, #17b15f);
      color: white;
    }
    .action-btn:hover,
    .quick-proxy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }
    .status {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 12px;
      line-height: 1.6;
    }
    .status.success {
      display: block;
      background: var(--status-success-bg);
      border-color: rgba(34, 197, 94, 0.22);
      color: var(--status-success-text);
    }
    .status.error {
      display: block;
      background: var(--status-error-bg);
      border-color: rgba(239, 68, 68, 0.22);
      color: var(--status-error-text);
    }
  </style>
</head>
<body>
  <div class="popup-shell">
    <div class="hero">
      <div class="hero-head">
        <div class="brand">
          <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 7V5a2 2 0 1 0-4 0v2H7a2 2 0 0 0-2 2v3h2a2 2 0 1 1 0 4H5v3a2 2 0 0 0 2 2h3v-2a2 2 0 1 1 4 0v2h3a2 2 0 0 0 2-2v-3h-2a2 2 0 1 1 0-4h2V9a2 2 0 0 0-2-2h-3Z"/></svg></div>
          <div class="brand-copy">
            <div class="brand-row">
              <div class="title">OpenClash 助手</div>
              <div class="version-badge" id="versionBadge">v2.0</div>
            </div>
            <div class="subtitle">快速添加规则并管理路由器 / 云端同步配置</div>
          </div>
        </div>
        <div class="icon-actions">
          <button class="icon-btn" id="themeToggle" aria-label="主题" data-tooltip="主题：跟随系统"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v18"/><path d="M12 5a7 7 0 1 0 0 14Z"/></svg></button>
          <button class="icon-btn" id="viewRules" aria-label="规则管理" data-tooltip="规则管理"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="7" y="4" width="10" height="16" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/><path d="M9 2h6v4H9z"/></svg></button>
          <button class="icon-btn" id="openDashboard" aria-label="控制面板" data-tooltip="控制面板"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="12" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg></button>
          <button class="icon-btn" id="config" aria-label="配置" data-tooltip="配置"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.3 3.1c.5-1 1.9-1 2.4 0l.5 1a1.7 1.7 0 0 0 1.9.9l1.1-.2c1.1-.2 2 .9 1.7 1.9l-.3 1.1a1.7 1.7 0 0 0 .8 1.9l1 .6c1 .5 1 1.9 0 2.4l-1 .5a1.7 1.7 0 0 0-.8 2l.3 1.1c.3 1-.6 2.1-1.7 1.8l-1.1-.3a1.7 1.7 0 0 0-1.9.8l-.5 1c-.5 1-1.9 1-2.4 0l-.5-1a1.7 1.7 0 0 0-1.9-.8l-1.1.3c-1.1.3-2-.8-1.7-1.8l.3-1.1a1.7 1.7 0 0 0-.8-2l-1-.5c-1-.5-1-1.9 0-2.4l1-.6a1.7 1.7 0 0 0 .8-1.9l-.3-1.1c-.3-1 .6-2.1 1.7-1.9l1.1.2a1.7 1.7 0 0 0 1.9-.9z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>

      <div class="hero-card">
        <div class="site-label" id="currentLabel">当前站点</div>
        <div class="site-domain" id="current">加载中...</div>
        <div class="site-meta" id="currentMeta">正在读取当前页面信息...</div>
        <div class="status-card" id="accessStatus"></div>
      </div>
    </div>

    <div class="content">
      <div class="section" id="ruleTypeSection">
        <div class="section-title">规则类型</div>
        <div class="radio-group" id="ruleTypeGroup"></div>
        <div class="preview-chip" id="domainPreview"></div>
      </div>

      <div class="section">
        <div class="section-title">添加规则</div>
        <div class="actions-grid">
          <button class="action-btn direct" id="addDirect">添加直连</button>
          <button class="action-btn proxy" id="addProxy">添加代理</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="cloudflare-api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
